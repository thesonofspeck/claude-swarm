name: ClaudeSwarmRemote
options:
  bundleIdPrefix: com.claudeswarm
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  PairingProtocol: { path: ../Packages/PairingProtocol }
  AtomPalette:     { path: ../Packages/AtomPalette }

targets:
  ClaudeSwarmRemote:
    type: application
    platform: iOS
    sources:
      - path: ClaudeSwarmRemote/Sources
    resources:
      - path: ClaudeSwarmRemote/Resources/Assets.xcassets
    info:
      path: ClaudeSwarmRemote/Info.plist
      properties:
        CFBundleName: Claude Swarm
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Used to scan a pairing QR code from your Mac."
        NSLocalNetworkUsageDescription: "Used to discover and pair with your Mac running Claude Swarm."
        NSBonjourServices:
          - _claudeswarm._tcp
        UIBackgroundModes:
          - remote-notification
    entitlements:
      path: ClaudeSwarmRemote/ClaudeSwarmRemote.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeswarm.remote
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: PairingProtocol
        product: PairingProtocol
      - package: AtomPalette
        product: AtomPalette
